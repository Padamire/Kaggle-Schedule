name: LSTM Run Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          
      - name: Install Kaggle CLI
        run: |
          rm -rf ~/.kaggle
          rm -rf ~/.config/kaggle
          pip install 'kaggle> 1.6.17'

  
      - name: Test Kaggle authentication
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          
          PYTHONUNBUFFERED: 1 
        run:
          python scheduler.py --notebook lstm-trainer-condensed --gpu --label 'LSTM Trainer' --workflow lstm-scheduler.yml
          
